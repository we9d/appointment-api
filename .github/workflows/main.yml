name: FastAPI Backend CI/CD
on:
push:
branches: [ "main" ] # หุ่นยนต์จะทำงานทุกครั้งที่ Push เข้า main
# สำคัญมาก: ปลดล็อกสิทธิ์ให้หุ่นยนต์สามารถแก้โค้ดและ Push สาขา release ได้
permissions:
contents: write
jobs:
test-and-release:
runs-on: ubuntu-latest
steps:
- name: 1. Checkout Code
uses: actions/checkout@v4
with:
fetch-depth: 0 # ดึงประวัติ Git มาทั้งหมดเพื่อให้ Push ข้าม Branch ได้
- name: 2. Run Robot Framework Tests
run: |
docker compose up --build --exit-code-from robot_tester
# ถ้า Robot รันไม่ผ่าน ขั้นตอนถัดไปจะไม่ทำงานเด็ดขาด
- name: 3. Promote to Release Branch
if: success() # จะทำงานก็ต่อเมื่อขั้นตอนรันเทสต์ "ผ่าน" เท่านั้น
run: |
git config --global user.name "github-actions[bot]"
git config --global user.email "github-actions[bot]@users.noreply.github.com"
# ดันโค้ดจากจุดปัจจุบันไปที่สาขา release บน GitHub
git push origin HEAD:release --force
